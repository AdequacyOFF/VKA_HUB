# Docker Compose override for DEVELOPMENT mode
# Usage: docker-compose -f docker-compose.yml -f docker-compose.dev.yml up
# Or simpler: make dev

services:
  backend:
    # Enable DEV mode (auto-reload via APP_ENV=dev)
    environment:
      APP_ENV: dev
      DEBUG: "True"

    # Bind-mount source code for instant changes without rebuild
    volumes:
      - ./backend:/app
      - static_uploads:/app/static/uploads

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: vkahub_frontend_dev
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "3001:3000"
    environment:
      - VITE_API_URL=http://backend:8000
    command: npm run dev -- --host 0.0.0.0
    depends_on:
      - backend
    networks:
      - vkahub_network
